<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Steam Deals</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e10;
      color: #c6d4df;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      text-align: center;
      padding: 40px 24px;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #66c0f4;
      margin-bottom: 64px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #556772;
      margin-bottom: 28px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f8a53d;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 16px;
    }

    h1 span { color: #66c0f4; }

    .sub {
      font-size: 14px;
      color: #556772;
      line-height: 1.8;
      margin-bottom: 56px;
    }

    .line {
      width: 32px;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 0 auto 56px;
    }

    .tg {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #66c0f4;
      font-size: 14px;
      border: 1px solid rgba(102,192,244,0.2);
      border-radius: 4px;
      padding: 12px 22px;
      transition: border-color .2s, background .2s;
    }

    .tg:hover {
      border-color: rgba(102,192,244,0.5);
      background: rgba(102,192,244,0.05);
    }

    .tg svg {
      width: 16px;
      height: 16px;
      fill: #2aabee;
      flex-shrink: 0;
    }

    footer {
      position: fixed;
      bottom: 24px;
      font-size: 11px;
      color: #2a3540;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="logo">Steam Deals</div>

    <div class="status">
      <span class="dot"></span>
      Обновление
    </div>

    <h1>Крупная переделка<br><span>на подходе</span></h1>

    <p class="sub">
      Новый интерфейс, новые функции<br>и многое другое.
    </p>

    <div class="line"></div>

    <a class="tg" href="https://t.me/t0pz1" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
      </svg>
      Topzi
    </a>
  </div>

  <footer>© 2025 STEAM DEALS</footer>

</body>
</html>
